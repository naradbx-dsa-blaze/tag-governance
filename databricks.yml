bundle:
  name: tag-governance

# ----------------------------------------------------------------------------
# To deploy into a NEW account (e.g. Bayada), a customer only changes these two
# values — either here, with --var on the CLI, or per-target below.
#   warehouse_id : any SQL warehouse in THEIR account
#   summary_table: catalog.schema.table the app/job own (their UC)
# Everything else (billing data, workspace list) is discovered automatically
# because system.billing.usage is account-wide.
# ----------------------------------------------------------------------------
variables:
  warehouse_id:
    description: "SQL warehouse the app and refresh job run on"
    default: 1c1ccdae9778e4ba
  summary_table:
    description: "Fully-qualified UC table for the pre-aggregated summary"
    default: users.narasimha_kamathardi.tag_governance_workload_daily
  queue_table:
    description: "Fully-qualified UC table for the write-intent queue"
    default: users.narasimha_kamathardi.tag_governance_write_queue
  audit_table:
    description: "Fully-qualified UC table for the change audit log"
    default: users.narasimha_kamathardi.tag_governance_audit
  suggestions_table:
    description: "Fully-qualified UC table for advisory ai_query suggestions"
    default: users.narasimha_kamathardi.tag_governance_suggestions
  annotate_model:
    description: "Model/endpoint name used by the advisory ai_query annotation"
    default: databricks-meta-llama-3-3-70b-instruct
  account_sp_scope:
    description: "Secret scope with the account-SP OAuth creds for M2 cross-workspace writes (empty = M1 home only)"
    default: ""

resources:
  jobs:
    tag-governance-refresh:
      name: tag-governance-refresh
      description: "Daily rebuild of the pre-aggregated untagged-workload summary table"
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"   # 06:00 daily
        timezone_id: "America/New_York"
      parameters:
        - name: summary_table
          default: ${var.summary_table}
      tasks:
        - task_key: materialize
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ./materialize.sql
            parameters:
              summary_table: ${var.summary_table}

    # Advisory ai_query suggestions — a SEPARATE, WEEKLY job. The ai_query pass runs
    # over the whole fleet (~50k workloads), so it's the one recurring inference
    # cost here. Team→workload attribution doesn't churn daily, so weekly is plenty
    # and keeps the customer's bill down. Runs Monday 07:13 ET, after the daily
    # 06:00 materialize has refreshed the summary table it reads.
    tag-governance-annotate:
      name: tag-governance-annotate
      description: "Weekly rebuild of advisory ai_query cost-center suggestions (kept weekly to limit inference cost)"
      schedule:
        quartz_cron_expression: "0 13 7 ? * MON"   # Mondays 07:13 ET
        timezone_id: "America/New_York"
      tasks:
        - task_key: annotate
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ./annotate.sql
            parameters:
              summary_table: ${var.summary_table}
              suggestions_table: ${var.suggestions_table}
              annotate_model: ${var.annotate_model}

    # Applies queued tag changes. dry_run=true (default) writes nothing and logs
    # intended old→new. Set dry_run=false to perform live per-product writes.
    # M1: workspace_id restricts to the home workspace.
    tag-governance-writer:
      name: tag-governance-writer
      description: "Drain the write queue and apply tags (dry-run by default), cost-descending with audit"
      parameters:
        - name: queue_table
          default: ${var.queue_table}
        - name: audit_table
          default: ${var.audit_table}
        - name: dry_run
          default: "true"
        - name: workspace_id
          default: ""
        - name: batch_id
          default: ""
        - name: max_workers
          default: "4"
        # Secret scope holding the ACCOUNT-level SP OAuth creds (keys: account_id,
        # client_id, client_secret). Empty = M1 (home workspace only). Set it to
        # enable M2 cross-workspace writes. Passed as a scope NAME, not the secrets.
        - name: account_sp_scope
          default: ${var.account_sp_scope}
        # smoke_test=true → reachability check only (no writes). For validating M2.
        - name: smoke_test
          default: "false"
      tasks:
        - task_key: drain_queue
          spark_python_task:
            python_file: ./writer_job.py
            # spark_python_task reads params from argv, so forward each job
            # parameter as key=value (writer_job._param parses these).
            parameters:
              - queue_table={{job.parameters.queue_table}}
              - audit_table={{job.parameters.audit_table}}
              - dry_run={{job.parameters.dry_run}}
              - workspace_id={{job.parameters.workspace_id}}
              - batch_id={{job.parameters.batch_id}}
              - smoke_test={{job.parameters.smoke_test}}
              - max_workers={{job.parameters.max_workers}}
              - account_sp_scope={{job.parameters.account_sp_scope}}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "3"

    # Rolls a batch back — restores every tag to its pre-batch value from the audit log.
    tag-governance-rollback:
      name: tag-governance-rollback
      description: "Undo a batch by replaying the audit log in reverse"
      parameters:
        - name: audit_table
          default: ${var.audit_table}
        - name: batch_id
          default: ""
        - name: dry_run
          default: "true"
        - name: max_workers
          default: "4"
        - name: account_sp_scope
          default: ${var.account_sp_scope}
      tasks:
        - task_key: rollback_batch
          spark_python_task:
            python_file: ./rollback_job.py
            parameters:
              - audit_table={{job.parameters.audit_table}}
              - batch_id={{job.parameters.batch_id}}
              - dry_run={{job.parameters.dry_run}}
              - max_workers={{job.parameters.max_workers}}
              - account_sp_scope={{job.parameters.account_sp_scope}}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "3"

  apps:
    tag-governance:
      name: tag-governance
      source_code_path: .
      description: "Scan untagged Databricks workloads by cost and tag them in-place for chargeback"
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
      config:
        command:
          - sh
          - -c
          - uvicorn app:app --host 0.0.0.0 --port ${DATABRICKS_APP_PORT:-8000}
        env:
          - name: DATABRICKS_WAREHOUSE_ID
            value_from: sql-warehouse
          - name: TAG_GOVERNANCE_SUMMARY_TABLE
            value: ${var.summary_table}
          - name: TAG_GOVERNANCE_QUEUE_TABLE
            value: ${var.queue_table}
          - name: TAG_GOVERNANCE_AUDIT_TABLE
            value: ${var.audit_table}
          - name: TAG_GOVERNANCE_SUGGESTIONS_TABLE
            value: ${var.suggestions_table}

targets:
  dev:
    default: true
  # Example customer target — Bayada copies this, sets their host + values.
  # bayada:
  #   workspace:
  #     host: https://<bayada-workspace>.cloud.databricks.com
  #   variables:
  #     warehouse_id: <their-warehouse-id>
  #     summary_table: <their_catalog>.<their_schema>.tag_governance_workload_daily
